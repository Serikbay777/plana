# Plana — reverse proxy.
# Один порт 80 наружу, /api/* → FastAPI, остальное → Next.js.

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;  # DXF-файлы загружаются как multipart

    # Engine API под префиксом /api/
    location /api/ {
        proxy_pass http://engine:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # генерация на больших контурах может быть длинной
    }

    # Веб-приложение
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
