# ============================================================================
# norms.yaml — конфиг нормативных требований для движка Plana
# ============================================================================
# ВНИМАНИЕ: значения ниже — РАМОЧНЫЕ, на основе общедоступных норм СП РК
# и СНиП. Перед приёмкой каждого тестового контура ОБЯЗАТЕЛЬНО ревью
# профильного специалиста-архитектора (5–10 часов согласно ТЗ §12).
# Изменения значений в этом файле НЕ ТРЕБУЮТ изменения кода.
# ============================================================================

version: "0.1.0-draft"
region: "RK"
last_review: null  # дата последнего ревью архитектором (ISO date)
reviewer: null     # ФИО / контакт ревьювера

# ---------------------------------------------------------------------------
# Коридоры и пути эвакуации (СП РК 3.02-101, СП РК 3.02-09)
# ---------------------------------------------------------------------------
corridor:
  min_width_m: 1.4               # минимальная ширина внутреннего коридора
  min_width_evacuation_m: 1.2    # эвакуационный коридор — узкий случай
  max_evacuation_length_m: 25.0  # максимальная длина пути эвакуации до лестницы
  min_clear_height_m: 2.5

# ---------------------------------------------------------------------------
# Комнаты — минимальные площади и геометрия (СП РК 3.02-101 «Жилые здания»)
# ---------------------------------------------------------------------------
rooms:
  living_room:
    min_area_sqm: 14.0           # гостиная / общая комната
    min_width_m: 2.8
  bedroom:
    min_area_sqm: 8.0            # спальня
    min_width_m: 2.0
  kitchen:
    min_area_sqm: 8.0            # отдельная кухня
    min_width_m: 1.8
  kitchen_living:
    min_area_sqm: 14.0           # кухня-гостиная (евроформат)
  bathroom:
    min_area_sqm: 3.3            # совмещённый санузел
    min_width_m: 1.5
  hall:
    min_area_sqm: 1.8
    min_width_m: 1.0

# ---------------------------------------------------------------------------
# Инсоляция (СанПиН РК, ориентировочно)
# ---------------------------------------------------------------------------
insolation:
  min_hours_per_day: 2.0         # для широт ≥ 48° — равноденствие
  required_share_of_apts: 1.0    # 100% жилых комнат должны иметь окна на фасаде
  preferred_orientations:        # юг, юго-восток, юго-запад
    - S
    - SE
    - SW

# ---------------------------------------------------------------------------
# Лифтово-лестничный узел (СП РК 4.02-08)
# ---------------------------------------------------------------------------
core:
  min_lifts_per_floor_apts: 4    # 1 лифт на каждые 4 квартиры на этаж (порог)
  min_stairs_per_section: 1
  min_stair_width_m: 1.05
  min_lift_shaft_m: 1.6
  shaft_required_for_storeys_above: 5

# ---------------------------------------------------------------------------
# Пожарная безопасность (СНиП РК 2.02-05, СП РК 2.02-101)
# ---------------------------------------------------------------------------
fire:
  max_dead_end_corridor_m: 12.0  # максимальный тупиковый коридор
  required_evacuation_exits: 2   # минимум 2 эвакуационных выхода на секцию
  fire_compartment_max_area_sqm: 2200

# ---------------------------------------------------------------------------
# Допуски тайлов
# ---------------------------------------------------------------------------
tile:
  size_tolerance: 0.10           # ±10% по ширине и глубине
  min_facade_width_m: 3.0        # минимальная длина фасада квартиры
  max_facade_width_m: 12.0
  apt_depth_min_m: 5.5
  apt_depth_max_m: 8.5

# ---------------------------------------------------------------------------
# Мокрые зоны
# ---------------------------------------------------------------------------
wet_zones:
  must_align_with_shaft: true    # санузлы и кухни — у инженерной шахты
  max_distance_to_shaft_m: 4.0
